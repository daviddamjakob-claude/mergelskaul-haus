<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>Mergelskaulhaus</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- ── Page: Übersicht ─────────────────────────────────── -->
  <div id="pageOverview" class="page active">

    <header class="topbar">
      <div class="topbar-title">🏠 Mergelskaulhaus</div>
      <div class="topbar-sub">Was bleibt, was geht?</div>
    </header>

    <div class="filter-bar">
      <div class="search-wrap">
        <svg class="search-icon" viewBox="0 0 24 24"><circle cx="11" cy="11" r="7"/><line x1="16.5" y1="16.5" x2="22" y2="22"/></svg>
        <input id="search" type="search" placeholder="Suchen…" />
      </div>
      <button id="btnFilter" class="filter-btn" aria-label="Filter">
        <svg viewBox="0 0 24 24"><line x1="4" y1="6" x2="20" y2="6"/><line x1="7" y1="12" x2="17" y2="12"/><line x1="10" y1="18" x2="14" y2="18"/></svg>
        <span id="filterLabel">Filter</span>
      </button>
    </div>

    <div id="statsBar" class="stats-bar hidden">
      <span id="statsText"></span>
      <button id="clearFilter" class="clear-filter">✕ Zurücksetzen</button>
    </div>

    <div id="itemList" class="item-list"></div>

    <div id="emptyState" class="empty-state hidden">
      <div class="empty-icon">📦</div>
      <p class="empty-title">Noch nichts hier</p>
      <p class="empty-sub">Tippe auf + um den ersten Eintrag zu erstellen</p>
    </div>

    <button id="fab" class="fab" aria-label="Neuer Eintrag">
      <svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
    </button>
  </div>

  <!-- ── Page: Formular ─────────────────────────────────── -->
  <div id="pageForm" class="page">

    <header class="topbar topbar-form">
      <button id="btnBack" class="back-btn" aria-label="Zurück">
        <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
      </button>
      <div class="topbar-title" id="formPageTitle">Neuer Eintrag</div>
      <button id="btnSave" class="save-btn">Speichern</button>
    </header>

    <div class="form-scroll">
      <input type="hidden" id="editId" />

      <!-- Images -->
      <section class="form-section">
        <div id="imagePreview" class="image-strip"></div>
        <label class="image-add-btn">
          <input type="file" id="fieldImages" accept="image/*" multiple />
          <svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
          Foto hinzufügen
        </label>
      </section>

      <!-- Core fields -->
      <section class="form-section">
        <div class="field-group">
          <label class="field-label" for="fieldItem">Gegenstand *</label>
          <input class="field-input" type="text" id="fieldItem" placeholder="z.B. Großmutters Sessel" />
        </div>

        <div class="field-group">
          <label class="field-label" for="fieldRaum">Raum *</label>
          <div class="select-wrap">
            <select class="field-input" id="fieldRaum">
              <option value="">Bitte wählen…</option>
              <option>Keller</option>
              <option>Wohnzimmer</option>
              <option>Küche</option>
              <option>Garten</option>
              <option>Badezimmer</option>
              <option>Schlafzimmer</option>
              <option>Zimmer Papa</option>
              <option>Zimmer Oma</option>
              <option>Dachgeschoss</option>
            </select>
            <svg class="select-arrow" viewBox="0 0 24 24"><polyline points="6 9 12 15 18 9"/></svg>
          </div>
        </div>
      </section>

      <!-- Entscheidung chips -->
      <section class="form-section">
        <div class="field-label">Entscheidung</div>
        <div class="chip-group" id="chipGroup">
          <button type="button" class="chip active" data-value="Noch unklar">Noch unklar</button>
          <button type="button" class="chip chip-kleinmachnow" data-value="Kleinmachnow">Kleinmachnow</button>
          <button type="button" class="chip chip-lager" data-value="Lager">Lager</button>
          <button type="button" class="chip chip-david" data-value="David">David</button>
          <button type="button" class="chip chip-nicki" data-value="Nicki">Nicki</button>
          <button type="button" class="chip chip-tizi" data-value="Tizi">Tizi</button>
          <button type="button" class="chip chip-tara" data-value="Tara">Tara</button>
          <button type="button" class="chip chip-entsorgen" data-value="Im Haus lassen / Entrümpelung">Im Haus lassen / Entrümpelung</button>
        </div>
      </section>

      <!-- Notes -->
      <section class="form-section">
        <div class="field-group">
          <label class="field-label" for="fieldNotes">Notizen</label>
          <textarea class="field-input field-textarea" id="fieldNotes" placeholder="Zustand, Erinnerungen, Fragen…" rows="4"></textarea>
        </div>
      </section>

      <div id="formError" class="form-error hidden"></div>

      <div class="form-bottom-pad"></div>
    </div>
  </div>

  <!-- ── Filter Sheet ────────────────────────────────────── -->
  <div id="filterSheet" class="sheet hidden">
    <div id="sheetBackdrop" class="sheet-backdrop"></div>
    <div class="sheet-panel">
      <div class="sheet-handle"></div>
      <h3 class="sheet-title">Filtern</h3>

      <div class="sheet-group">
        <div class="sheet-label">Raum</div>
        <div class="chip-group">
          <button class="chip chip-sm active" data-filter="raum" data-value="">Alle</button>
          <button class="chip chip-sm" data-filter="raum" data-value="Keller">Keller</button>
          <button class="chip chip-sm" data-filter="raum" data-value="Wohnzimmer">Wohnzimmer</button>
          <button class="chip chip-sm" data-filter="raum" data-value="Küche">Küche</button>
          <button class="chip chip-sm" data-filter="raum" data-value="Garten">Garten</button>
          <button class="chip chip-sm" data-filter="raum" data-value="Badezimmer">Badezimmer</button>
          <button class="chip chip-sm" data-filter="raum" data-value="Schlafzimmer">Schlafzimmer</button>
          <button class="chip chip-sm" data-filter="raum" data-value="Zimmer Papa">Zimmer Papa</button>
          <button class="chip chip-sm" data-filter="raum" data-value="Zimmer Oma">Zimmer Oma</button>
          <button class="chip chip-sm" data-filter="raum" data-value="Dachgeschoss">Dachgeschoss</button>
        </div>
      </div>

      <div class="sheet-group">
        <div class="sheet-label">Entscheidung</div>
        <div class="chip-group">
          <button class="chip chip-sm active" data-filter="entsch" data-value="">Alle</button>
          <button class="chip chip-sm" data-filter="entsch" data-value="Noch unklar">Noch unklar</button>
          <button class="chip chip-sm chip-kleinmachnow" data-filter="entsch" data-value="Kleinmachnow">Kleinmachnow</button>
          <button class="chip chip-sm chip-lager" data-filter="entsch" data-value="Lager">Lager</button>
          <button class="chip chip-sm chip-david" data-filter="entsch" data-value="David">David</button>
          <button class="chip chip-sm chip-nicki" data-filter="entsch" data-value="Nicki">Nicki</button>
          <button class="chip chip-sm chip-tizi" data-filter="entsch" data-value="Tizi">Tizi</button>
          <button class="chip chip-sm chip-tara" data-filter="entsch" data-value="Tara">Tara</button>
          <button class="chip chip-sm chip-entsorgen" data-filter="entsch" data-value="Im Haus lassen / Entrümpelung">Im Haus lassen / Entrümpelung</button>
        </div>
      </div>

      <button id="applyFilter" class="btn-apply">Anwenden</button>
    </div>
  </div>

  <!-- ── Image Lightbox ─────────────────────────────────── -->
  <div id="lightbox" class="lightbox hidden">
    <div id="lightboxBackdrop" class="lightbox-backdrop"></div>
    <img id="lightboxImg" src="" alt="" />
    <button id="lightboxClose" class="lightbox-close">
      <svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
    </button>
  </div>

  <script src="app.js"></script>
</body>
</html>
